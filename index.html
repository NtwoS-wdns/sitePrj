<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeterForge Game Studio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #f0f0f0;
        }
        /* Фоновая анимация */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://i.imgur.com/HyVi73q.gif') center/cover no-repeat;
            z-index: -1;
            opacity: 0.8;
        }
        header {
            background-color: rgba(255, 69, 0, 0.8);
            padding: 20px;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 2.5em;
        }
        nav {
            margin: 20px 0;
            text-align: center;
        }
        nav a {
            color: #fff;
            margin: 0 15px;
            text-decoration: none;
            font-size: 1.2em;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .content {
            padding: 20px;
            text-align: center;
        }
        .content h2 {
            font-size: 2em;
        }
        .screenshots {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .screenshot {
            position: relative;
            overflow: hidden;
            width: 250px;
            border-radius: 8px;
            transition: transform 0.3s ease;
            
        }
        .screenshot img {
            width: 100%;
            border-radius: 8px;
        }
        .screenshot:hover {
            transform: scale(1.05);
            cursor: url('https://art.pixilart.com/28f49db67461e10.png'), auto;
        }
        footer {
            background-color: rgba(255, 69, 0, 0.8);
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>AeterForge Game Studio</h1>
    </header>
    <nav>
        <a href="#about">О нас</a>
        <a href="#games">Игры</a>
        <a href="#contact">Контакты</a>
    </nav>
    <div class="content" id="about">
        <h2>О нас</h2>
        <p>Мы создаем уникальные игры с глубокими мирами и захватывающими сюжетами.</p>
    </div>
    <div class="content" id="games">
        <h2>Наши скриншоты</h2>
        <div class="screenshots">
            <div class="screenshot">
                <img src="screenshot1.jpg" alt="Скриншот 1">
            </div>
            <div class="screenshot">
                <img src="screenshot2.jpg" alt="Скриншот 2">
            </div>
            <div class="screenshot">
                <img src="screenshot3.jpg" alt="Скриншот 3">
            </div>
        </div>
    </div>
    <footer>
        <p>&copy; 2024 AeterForge Game Studio. Все права защищены.</p>
    </footer>
</body>
</html>
