<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js">
	</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeterForge</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: #f0f0f0;
        }
        /* Фоновая анимация */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://blog.jitter.video/content/images/size/w1200/2021/12/Jitter-Pink-perfect-loop-cubes.gif') center/cover no-repeat;
            z-index: -1;
            opacity: 0.8;
        }
        header {
            background-color: #292525;
            padding: 20px;
            text-align: center;
	    top: 0;
	    position: fixed;
	    width: 100%;
        }
        header h1 {
            margin: 0;
            font-size: 2.5em;
        }
        nav {
            margin: 20px 0;
            text-align: center;
        }
        nav a {
            color: #fff;
            margin: 0 15px;
            text-decoration: none;
            font-size: 1.2em;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .content {
            padding: 20px;
            text-align: center;
        }
        .content h2 {
            font-size: 2em;
        }
        .screenshots {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .screenshot {
            position: relative;
            overflow: hidden;
            width: 700px;
            border-radius: 8px;
	    height: 500px;
            transition: transform 0.3s ease;
            
        }
        .screenshot img {
            width: 100%;
	    height: 100%;
            border-radius: 8px;
        }
        .screenshot:hover {
            transform: scale(1.05);
            cursor: url('https://codehs.com/uploads/7d47d53fcfa4b58fb6f117e2a09a62bd'), auto;
        }
        .footer {
            background-color: #292525;
            padding: 10px;
            text-align: center;
	    bottom: 0;
	    width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>AeterForge</h1>
    </header>
    <nav>
        <a href="#about">О нас</a>
        <a href="#games">Игры</a>
        <a href="#contact">Контакты</a>
    </nav>
    <div class="content" id="about">
        <h2>О нас</h2>
        <p>Мы создаем уникальные игры с глубокими мирами и захватывающими сюжетами.</p>
    </div>
    <div class="content" id="games">
        <h2>Наши скриншоты</h2>

            <div class="screenshot">
                <img src="https://cdn.airalo.com/images/7004beab-1263-4b73-ae43-9742372ad44f.png" alt="Скриншот 1">
            </div>
            <div class="screenshot">
                <img src="https://img.huffingtonpost.com/asset/56313b1e1c00007700570dcb.jpeg?cache=2ekoW6RaMu&ops=1778_1000" alt="Скриншот 2">
            </div>
            <div class="screenshot">
                <img src="https://hips.hearstapps.com/housebeautiful/assets/17/33/palawan-island.jpg" alt="Скриншот 3">
            </div>

            </div>
            <div class="screenshot">
